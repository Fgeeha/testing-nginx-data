events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Custom log format for browser comparison
    log_format browser_comparison '$remote_addr - $remote_user [$time_local] '
                                  '"$request" $status $bytes_sent '
                                  '"$http_referer" "$http_user_agent" '
                                  '"$http_accept" "$http_accept_language" '
                                  '"$http_accept_encoding" "$http_connection" '
                                  '"$http_cache_control" "$http_dnt" '
                                  '"$http_upgrade_insecure_requests" '
                                  '$request_time $upstream_response_time';

    # Access log with custom format
    access_log /var/log/nginx/browser_access.log browser_comparison;
    
    # Error log
    error_log /var/log/nginx/error.log warn;

    server {
        listen 80;
        server_name localhost;
        
        root /usr/share/nginx/html;
        index index.html;

        # Main test page
        location / {
            try_files $uri $uri/ /index.html;
            add_header X-Server-Info "Nginx-Browser-Test";
            add_header X-Request-Time $request_time;
        }

        # API endpoint for collecting browser data
        location /api/browser-info {
            add_header Content-Type application/json;
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type";
            
            if ($request_method = 'OPTIONS') {
                return 204;
            }
            
            return 200 '{"status":"ok","timestamp":"$time_local","user_agent":"$http_user_agent","remote_addr":"$remote_addr"}';
        }

        # Test endpoints for different content types
        location /test/json {
            add_header Content-Type application/json;
            return 200 '{"test":"json","browser":"$http_user_agent","time":"$time_local"}';
        }

        location /test/xml {
            add_header Content-Type application/xml;
            return 200 '<?xml version="1.0"?><test><browser>$http_user_agent</browser><time>$time_local</time></test>';
        }

        location /test/large {
            root /usr/share/nginx/html;
            try_files /large-file.txt =404;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
}